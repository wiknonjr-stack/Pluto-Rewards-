<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Leaderboard — Pluto Rewards</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#09090B;--card:#1C1C1E;--gold:#D4AF37;--gold-bright:#F4C430;
--gold-soft:#E6C76B;--purple:#8B5CF6;--cyan:#22D3EE;
--white:#FFFFFF;--gray:#A1A1AA;
--border-gold:rgba(212,175,55,0.12);
--border-purple:rgba(139,92,246,0.2);
}
body{background:var(--bg);color:var(--white);font-family:'Segoe UI',sans-serif;overflow-x:hidden;padding-bottom:80px;min-height:100vh}
body::before{content:"";position:fixed;inset:0;background-image:radial-gradient(1px 1px at 10% 20%,rgba(212,175,55,0.3) 0%,transparent 100%),radial-gradient(1px 1px at 30% 60%,rgba(139,92,246,0.25) 0%,transparent 100%),radial-gradient(1px 1px at 55% 15%,rgba(212,175,55,0.2) 0%,transparent 100%),radial-gradient(1px 1px at 75% 45%,rgba(34,211,238,0.2) 0%,transparent 100%);pointer-events:none;z-index:0}

nav.top-nav{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid var(--border-gold);position:sticky;top:0;background:rgba(9,9,11,0.92);backdrop-filter:blur(14px);z-index:100}
.logo{font-size:18px;font-weight:900;letter-spacing:4px;color:var(--white);text-decoration:none}
.logo-pluto{background:linear-gradient(135deg,var(--gold),var(--gold-bright));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.back{font-size:12px;color:var(--gray);text-decoration:none;background:rgba(255,255,255,0.04);border:1px solid var(--border-gold);border-radius:50px;padding:8px 16px}

.wrap{max-width:600px;margin:0 auto;padding:24px 16px 12px;position:relative;z-index:1}
.page-title{font-size:clamp(24px,6vw,34px);font-weight:900;text-align:center}
.page-sub{font-size:12px;color:var(--gray);text-align:center;margin-top:4px;margin-bottom:18px}

.position-card{background:linear-gradient(135deg,#171205,var(--card));border:1px solid rgba(212,175,55,0.25);border-radius:18px;padding:20px;margin:0 16px 20px}
.position-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.position-rank{font-size:34px;font-weight:900;color:var(--gold-bright);min-width:64px}
.position-name{font-size:14px;font-weight:700;color:var(--white)}
.position-title{font-size:11px;color:var(--purple);font-weight:600}
.position-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border-top:1px solid rgba(255,255,255,0.06);padding-top:14px}
.position-mini{text-align:center}
.position-mini-val{font-size:15px;font-weight:800;color:var(--white)}
.position-mini-val.up{color:#22c55e}
.position-mini-val.down{color:#ef4444}
.position-mini-lbl{font-size:8px;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-top:2px}

.tabs{display:flex;gap:6px;overflow-x:auto;padding:0 16px;margin-bottom:18px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{background:rgba(255,255,255,0.03);border:1px solid var(--border-gold);color:var(--gray);font-size:11px;padding:8px 16px;border-radius:50px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.tab-btn.active{background:rgba(139,92,246,0.15);border-color:var(--purple);color:var(--purple);font-weight:700}

.podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin:0 16px 24px}
.podium-card{background:var(--card);border-radius:16px;padding:16px 8px;text-align:center;flex:1;max-width:130px}
.podium-card.p1{order:2;border:1px solid rgba(212,175,55,0.4);padding-top:22px;transform:scale(1.06)}
.podium-card.p2{order:1;border:1px solid rgba(148,163,184,0.3)}
.podium-card.p3{order:3;border:1px solid rgba(180,83,9,0.3)}
.podium-avatar{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto 8px;overflow:hidden}
.podium-avatar img{width:100%;height:100%;object-fit:cover}
.podium-medal{font-size:16px;margin-bottom:2px}
.podium-name{font-size:12px;font-weight:800;color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.podium-title{font-size:9px;color:var(--purple);margin-bottom:5px}
.podium-score{font-size:15px;font-weight:900;color:var(--gold-bright)}
.podium-score-lbl{font-size:8px;color:var(--gray);text-transform:uppercase}

.section-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-soft);margin:22px 16px 10px}
.lb-list{margin:0 16px}
.lb-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border-gold);border-radius:12px;padding:10px 12px;margin-bottom:7px}
.lb-row.me{border-color:var(--purple);background:rgba(139,92,246,0.06)}
.lb-rank{font-size:12px;font-weight:800;color:var(--gray);width:22px;text-align:center}
.lb-avatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden;flex-shrink:0}
.lb-avatar img{width:100%;height:100%;object-fit:cover}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:13px;font-weight:700;color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-title{font-size:9px;color:var(--purple)}
.lb-score-wrap{text-align:right}
.lb-score{font-size:13px;font-weight:800;color:var(--gold-bright)}
.lb-move{font-size:10px;font-weight:700}
.lb-move.up{color:#22c55e}
.lb-move.down{color:#ef4444}
.lb-move.new{color:var(--cyan)}
.lb-move.flat{color:var(--gray)}

.rising-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.rising-row:last-child{border-bottom:none}
.rising-name{flex:1;font-size:12px;color:var(--white);font-weight:600}
.rising-jump{font-size:12px;font-weight:800;color:#22c55e}

.hof-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(212,175,55,0.06)}
.hof-row:last-child{border-bottom:none}
.hof-rank{font-size:14px;font-weight:900;width:26px}
.hof-name{flex:1;font-size:13px;font-weight:700;color:var(--white)}
.hof-score{font-size:12px;font-weight:800;color:var(--gold)}

.card{background:var(--card);border:1px solid var(--border-gold);border-radius:16px;padding:16px;margin:0 16px}

.loading,.empty{color:var(--gray);font-size:12px;text-align:center;padding:20px 0}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(28,28,30,0.97);border-top:1px solid var(--border-purple);display:flex;justify-content:space-around;align-items:center;padding:10px 0 14px;z-index:100;backdrop-filter:blur(10px)}
.bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:var(--gray);font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:4px 12px}
.bottom-nav a.active{color:var(--purple)}
.bottom-nav a svg{width:22px;height:22px;margin-bottom:3px}
</style>
</head>
<body>
  <nav class="top-nav">
  <a class="logo" href="/"><span class="logo-pluto">♇ PLUTO</span></a>
  <a class="back" href="/">← Home</a>
</nav>

<div class="wrap">
  <h1 class="page-title">🏆 LEADERBOARD</h1>
  <p class="page-sub">Compete. Discover. Rise.</p>
</div>

<div class="position-card" id="position-card">
  <div class="position-top">
    <div class="position-rank" id="my-rank">—</div>
    <div>
      <div class="position-name" id="my-name">Connect Spotify</div>
      <div class="position-title" id="my-title">to see your rank</div>
    </div>
  </div>
  <div class="position-grid">
    <div class="position-mini">
      <div class="position-mini-val" id="my-score">—</div>
      <div class="position-mini-lbl">Discovery Score</div>
    </div>
    <div class="position-mini">
      <div class="position-mini-val" id="my-percentile">—</div>
      <div class="position-mini-lbl">Percentile</div>
    </div>
    <div class="position-mini">
      <div class="position-mini-val" id="my-change">—</div>
      <div class="position-mini-lbl">This Week</div>
    </div>
  </div>
</div>

<div class="tabs" id="category-tabs">
  <button class="tab-btn active" data-type="discovery">👑 Discovery</button>
  <button class="tab-btn" data-type="streak">🔥 Streaks</button>
  <button class="tab-btn" data-type="earnings">🎁 Pluto Earned</button>
</div>

<div class="podium" id="podium"></div>

<div class="section-label">Rankings</div>
<div class="lb-list" id="lb-list"><div class="loading">Loading...</div></div>

<div class="section-label">🚀 Rising This Week</div>
<div class="card" id="rising-card"><div class="loading">Loading...</div></div>

<div class="section-label">🌌 Hall of Fame</div>
<div class="card" id="hof-card" style="border-color:rgba(212,175,55,0.25)"><div class="loading">Loading...</div></div>

<div style="height:16px"></div>

<nav class="bottom-nav">
  <a href="/">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </a>
  <a href="/campaigns.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
    Quests
  </a>
  <a href="/leaderboard.html" class="active">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 6 4 6 4 19 20 19 20 6 16 6"/><rect x="8" y="2" width="8" height="4" rx="1"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="9" y1="22" x2="15" y2="22"/></svg>
    Board
  </a>
  <a href="/profile.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Profile
  </a>
</nav>
<script>
var API = "https://pluto-rewards-production.up.railway.app";
var token = localStorage.getItem("pluto_token");
var myId = localStorage.getItem("pluto_user_id");
var currentType = "discovery";
var VAL_LABELS = { discovery: "DS", streak: "DAYS", earnings: "♇" };

function getVal(u, type) {
  if (type === "streak") return u.streak_days;
  if (type === "earnings") return u.total_pluto;
  return u.discovery_score;
}

function load(type) {
  currentType = type;
  document.getElementById("podium").innerHTML = '<div class="loading">Loading...</div>';
  document.getElementById("lb-list").innerHTML = '<div class="loading">Loading...</div>';

  fetch(API + "/api/leaderboard/" + type)
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var list = data.leaderboard || [];
      if (list.length >= 3) {
        renderPodium(list.slice(0, 3), type);
        renderList(list.slice(3), type);
      } else {
        document.getElementById("podium").innerHTML = "";
        renderList(list, type);
      }
    })
    .catch(function () {
      document.getElementById("lb-list").innerHTML = '<div class="empty">Could not load leaderboard.</div>';
    });

  loadMe(type);
}

function avatarHtml(u, sizeClass) {
  if (u.avatar_url) return '<img src="' + u.avatar_url + '">';
  return (u.title ? u.title.icon : "✨");
}

function renderPodium(top3, type) {
  var podium = document.getElementById("podium");
  var medals = ["🥇", "🥈", "🥉"];
  var classes = ["p1", "p2", "p3"];
  podium.innerHTML = "";
  top3.forEach(function (u, i) {
    var title = u.title ? u.title.name : "Newcomer";
    var div = document.createElement("div");
    div.className = "podium-card " + classes[i];
    div.innerHTML =
      '<div class="podium-avatar">' + avatarHtml(u) + '</div>' +
      '<div class="podium-medal">' + medals[i] + '</div>' +
      '<div class="podium-name">' + u.name + '</div>' +
      '<div class="podium-title">' + title + '</div>' +
      '<div class="podium-score">' + Number(getVal(u, type)).toLocaleString() + '</div>' +
      '<div class="podium-score-lbl">' + VAL_LABELS[type] + '</div>';
    podium.appendChild(div);
  });
}

function renderList(rest, type) {
  var list = document.getElementById("lb-list");
  if (rest.length === 0) {
    list.innerHTML = '<div class="empty">No rankings yet. Be the first to join a quest!</div>';
    return;
  }
  list.innerHTML = "";
  rest.forEach(function (u) {
    var title = u.title ? u.title.name : "Newcomer";
    var moveHtml;
    if (u.rank_change === null || u.rank_change === undefined) {
      moveHtml = '<span class="lb-move new">NEW</span>';
    } else if (u.rank_change > 0) {
      moveHtml = '<span class="lb-move up">\u2191 ' + u.rank_change + '</span>';
    } else if (u.rank_change < 0) {
      moveHtml = '<span class="lb-move down">\u2193 ' + Math.abs(u.rank_change) + '</span>';
    } else {
      moveHtml = '<span class="lb-move flat">\u2014</span>';
    }
    var row = document.createElement("div");
    row.className = "lb-row" + (u.id === myId ? " me" : "");
    row.innerHTML =
      '<div class="lb-rank">#' + u.rank + '</div>' +
      '<div class="lb-avatar">' + avatarHtml(u) + '</div>' +
      '<div class="lb-info"><div class="lb-name">' + u.name + '</div><div class="lb-title">' + title + '</div></div>' +
      '<div class="lb-score-wrap"><div class="lb-score">' + Number(getVal(u, type)).toLocaleString() + '</div>' + moveHtml + '</div>';
    list.appendChild(row);
  });
}

function loadMe(type) {
  if (!token) return;
  fetch(API + "/api/leaderboard/" + type + "/me", { headers: { "Authorization": "Bearer " + token } })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (!data.me) {
        document.getElementById("my-rank").textContent = "—";
        document.getElementById("my-name").textContent = "Not ranked yet";
        document.getElementById("my-title").textContent = "Join a quest to appear here";
        document.getElementById("my-score").textContent = "0";
        document.getElementById("my-percentile").textContent = "—";
        document.getElementById("my-change").textContent = "—";
        return;
      }
      document.getElementById("my-rank").textContent = "#" + data.rank;
      document.getElementById("my-name").textContent = data.me.name;
      document.getElementById("my-title").textContent = data.me.title.icon + " " + data.me.title.name;
      document.getElementById("my-score").textContent = Number(getVal(data.me, type)).toLocaleString();
      document.getElementById("my-percentile").textContent = "Top " + (100 - data.percentile + 1) + "%";

      var changeEl = document.getElementById("my-change");
      if (data.rank_change > 0) {
        changeEl.textContent = "\u2191 " + data.rank_change;
        changeEl.className = "position-mini-val up";
      } else if (data.rank_change < 0) {
        changeEl.textContent = "\u2193 " + Math.abs(data.rank_change);
        changeEl.className = "position-mini-val down";
      } else {
        changeEl.textContent = "\u2014";
        changeEl.className = "position-mini-val";
      }
    })
    .catch(function () {});
}

document.getElementById("category-tabs").addEventListener("click", function (e) {
  if (!e.target.classList.contains("tab-btn")) return;
  document.querySelectorAll(".tab-btn").forEach(function (b) { b.classList.remove("active"); });
  e.target.classList.add("active");
  load(e.target.getAttribute("data-type"));
});

fetch(API + "/api/leaderboard/discovery")
  .then(function (r) { return r.json(); })
  .then(function (data) {
    var rising = (data.leaderboard || [])
      .filter(function (u) { return u.rank_change && u.rank_change > 0; })
      .sort(function (a, b) { return b.rank_change - a.rank_change; })
      .slice(0, 5);
    var card = document.getElementById("rising-card");
    if (rising.length === 0) {
      card.innerHTML = '<div class="empty">Check back after a week to see who\u2019s climbing.</div>';
      return;
    }
    card.innerHTML = "";
    rising.forEach(function (u) {
      var row = document.createElement("div");
      row.className = "rising-row";
      row.innerHTML = '<div class="rising-name">' + u.name + '</div><div class="rising-jump">\u2191 ' + u.rank_change + '</div>';
      card.appendChild(row);
    });
  })
  .catch(function () {
    document.getElementById("rising-card").innerHTML = '<div class="empty">Could not load.</div>';
  });

fetch(API + "/api/hall-of-fame")
  .then(function (r) { return r.json(); })
  .then(function (data) {
    var card = document.getElementById("hof-card");
    var hof = (data.hall_of_fame || []).filter(function (u) { return u.name && u.name !== "Anonymous Fan"; });
    if (hof.length === 0) {
      card.innerHTML = '<div class="empty">No legends yet. Be the first.</div>';
      return;
    }
    var medals = { 1: "🥇", 2: "🥈", 3: "🥉" };
    card.innerHTML = "";
    hof.forEach(function (u) {
      var row = document.createElement("div");
      row.className = "hof-row";
      row.innerHTML =
        '<div class="hof-rank">' + (medals[u.rank] || ("#" + u.rank)) + '</div>' +
        '<div class="hof-name">' + u.name + '</div>' +
        '<div class="hof-score">' + Number(u.discovery_score).toLocaleString() + '</div>';
      card.appendChild(row);
    });
  })
  .catch(function () {
    document.getElementById("hof-card").innerHTML = '<div class="empty">Could not load.</div>';
  });

load("discovery");
</script>

</body>
</html>
