<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Profile — Pluto Rewards</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#09090B;--card:#1C1C1E;--gold:#D4AF37;--gold-bright:#F4C430;
--gold-soft:#E6C76B;--purple:#8B5CF6;--cyan:#22D3EE;
--white:#FFFFFF;--gray:#A1A1AA;
--border-gold:rgba(212,175,55,0.15);
--border-purple:rgba(139,92,246,0.2);
}
body{background:var(--bg);color:var(--white);font-family:'Segoe UI',sans-serif;overflow-x:hidden;padding-bottom:80px;min-height:100vh}
body::before{content:"";position:fixed;inset:0;background-image:radial-gradient(1px 1px at 10% 20%,rgba(212,175,55,0.3) 0%,transparent 100%),radial-gradient(1px 1px at 30% 60%,rgba(139,92,246,0.25) 0%,transparent 100%),radial-gradient(1px 1px at 55% 15%,rgba(212,175,55,0.2) 0%,transparent 100%),radial-gradient(1px 1px at 75% 45%,rgba(34,211,238,0.2) 0%,transparent 100%);pointer-events:none;z-index:0}

nav.top-nav{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid var(--border-gold);position:sticky;top:0;background:rgba(9,9,11,0.92);backdrop-filter:blur(14px);z-index:200}
.logo{font-size:18px;font-weight:900;letter-spacing:4px;color:var(--white);text-decoration:none}
.logo-pluto{background:linear-gradient(135deg,var(--gold),var(--gold-bright));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hamburger{background:rgba(255,255,255,0.04);border:1px solid var(--border-gold);color:var(--white);width:40px;height:40px;border-radius:10px;font-size:18px;cursor:pointer}

#menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:none}
#menu-overlay.show{display:block}
#side-menu{position:fixed;top:0;right:-260px;width:240px;height:100%;background:var(--card);border-left:1px solid var(--border-gold);z-index:301;transition:right .25s;padding:24px 20px}
#side-menu.show{right:0}
.menu-close{text-align:right;font-size:20px;color:var(--gray);cursor:pointer;margin-bottom:16px}
.menu-link{display:block;padding:12px 14px;border-radius:10px;color:var(--white);text-decoration:none;font-size:14px;margin-bottom:4px}
.menu-link:active{background:rgba(212,175,55,0.08)}

.wrap{max-width:560px;margin:0 auto;padding:28px 20px 24px;position:relative;z-index:1}

.profile-card{background:linear-gradient(135deg,#171205,var(--card));border:1px solid rgba(212,175,55,0.25);border-radius:20px;padding:28px;text-align:center;margin-bottom:18px;position:relative;overflow:hidden}
.profile-card::before{content:"";position:absolute;top:-40%;right:-20%;width:180px;height:180px;background:radial-gradient(circle,rgba(212,175,55,0.1),transparent 70%);pointer-events:none}

.avatar-wrap{position:relative;width:84px;height:84px;margin:0 auto 12px;border-radius:50%;overflow:hidden;border:2px solid rgba(212,175,55,0.4);background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:1}
.avatar-wrap img{width:100%;height:100%;object-fit:cover}
.avatar-wrap .placeholder{font-size:34px}
.avatar-edit{position:absolute;bottom:0;right:0;background:var(--gold);color:#000;font-size:10px;font-weight:800;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center}
#avatar-input{display:none}

.profile-name{font-size:22px;font-weight:900;margin-bottom:4px}
.profile-country{font-size:12px;color:var(--gray);margin-bottom:8px}
.title-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--purple);background:rgba(139,92,246,0.1);border:1px solid var(--border-purple);border-radius:50px;padding:6px 16px}

.score-card{background:var(--card);border:1px solid rgba(212,175,55,0.3);border-radius:18px;padding:22px;margin-bottom:14px;text-align:center}
.score-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-soft);margin-bottom:6px}
.score-val{font-size:42px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--gold-bright));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.score-percentile{font-size:12px;color:var(--gray);margin:6px 0 16px}
.score-progress-label{font-size:11px;color:var(--gray);margin-bottom:6px;display:flex;justify-content:space-between}
.score-bar{height:7px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
.score-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-bright));border-radius:4px;transition:width .6s;width:0%}

.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-box{background:var(--card);border:1px solid var(--border-gold);border-radius:16px;padding:18px;text-align:center}
.stat-icon{font-size:22px;margin-bottom:6px}
.stat-val{font-size:20px;font-weight:900;color:var(--white)}
.stat-lbl{font-size:9px;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-top:3px}

.badge-section{background:var(--card);border:1px solid var(--border-gold);border-radius:16px;padding:18px;margin-bottom:14px}
.badge-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.badge-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-soft)}
.badge-link{font-size:11px;color:var(--purple);text-decoration:none}
.badge-row{display:flex;gap:10px;flex-wrap:wrap}
.badge-icon-tile{width:48px;height:48px;border-radius:12px;background:rgba(212,175,55,0.06);border:1px solid var(--border-gold);display:flex;align-items:center;justify-content:center;font-size:20px;opacity:0.3}
.badge-icon-tile.earned{opacity:1;border-color:rgba(212,175,55,0.4);box-shadow:0 0 10px rgba(212,175,55,0.08)}

.share-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-bright));color:#000;font-weight:800;font-size:15px;padding:15px;border:none;border-radius:50px;cursor:pointer;margin-bottom:12px}

.login-prompt{text-align:center;padding:60px 20px;color:var(--gray);font-size:14px}
.login-prompt a{color:var(--gold);text-decoration:none;font-weight:700}

canvas{display:none}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(28,28,30,0.97);border-top:1px solid var(--border-purple);display:flex;justify-content:space-around;align-items:center;padding:10px 0 14px;z-index:100;backdrop-filter:blur(10px)}
.bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:var(--gray);font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:4px 12px}
.bottom-nav a.active{color:var(--purple)}
.bottom-nav a .icon{font-size:20px}
</style>
</head>
<body>

<nav class="top-nav">
  <a class="logo" href="/"><span class="logo-pluto">♇ PLUTO</span></a>
  <button class="hamburger" id="menu-btn">☰</button>
</nav>

<div id="menu-overlay"></div>
<div id="side-menu">
  <div class="menu-close" id="menu-close">✕</div>
  <a class="menu-link" href="/">🏠 Home</a>
  <a class="menu-link" href="/campaigns.html">🎯 Quests</a>
  <a class="menu-link" href="/leaderboard.html">🏆 Leaderboard</a>
  <a class="menu-link" href="/profile.html">👤 Profile</a>
</div>

<div class="wrap" id="content">
  <div class="login-prompt">Loading your profile...</div>
</div>

<canvas id="shareCanvas" width="600" height="800"></canvas>

<nav class="bottom-nav">
  <a href="/"><span class="icon">🏠</span>Home</a>
  <a href="/campaigns.html"><span class="icon">🎯</span>Quests</a>
  <a href="/leaderboard.html"><span class="icon">🏆</span>Board</a>
  <a href="/profile.html" class="active"><span class="icon">👤</span>Profile</a>
  </nav>
  <script>
var API = "https://pluto-rewards-production.up.railway.app";
var token = localStorage.getItem("pluto_token");

document.getElementById("menu-btn").addEventListener("click", function() {
  document.getElementById("side-menu").classList.add("show");
  document.getElementById("menu-overlay").classList.add("show");
});
document.getElementById("menu-close").addEventListener("click", closeMenu);
document.getElementById("menu-overlay").addEventListener("click", closeMenu);
function closeMenu() {
  document.getElementById("side-menu").classList.remove("show");
  document.getElementById("menu-overlay").classList.remove("show");
}

if (!token) {
  document.getElementById("content").innerHTML =
    '<div class="login-prompt">Connect your Spotify on the <a href="/">home page</a> to see your profile.</div>';
} else {
  Promise.all([
    fetch(API + "/api/profile/me", { headers: { "Authorization": "Bearer " + token } }).then(function(r) { return r.json(); }),
    fetch(API + "/api/leaderboard/discovery/me", { headers: { "Authorization": "Bearer " + token } }).then(function(r) { return r.json(); }),
    fetch(API + "/api/badges/me", { headers: { "Authorization": "Bearer " + token } }).then(function(r) { return r.json(); })
  ])
  .then(function(results) {
    render(results[0], results[1], results[2]);
  })
  .catch(function(err) {
    document.getElementById("content").innerHTML = '<div class="login-prompt">Error: ' + err.message + '</div>';
  });
    }

function render(p, rankData, badgeData) {
  var percentile = rankData.percentile ? (100 - rankData.percentile + 1) : null;
  var progress = p.title_progress || { next: null, pointsToNext: 0, progress: 100 };

  var progressLabel = progress.next
    ? progress.pointsToNext + " pts to " + progress.next
    : "Max title reached";

  var badges = (badgeData.badges || []).slice(0, 8);
  var badgeIcons = badges.map(function(b) {
    return '<div class="badge-icon-tile' + (b.earned ? ' earned' : '') + '" title="' + b.name + '">' + b.icon + '</div>';
  }).join("");

  document.getElementById("content").innerHTML =
    '<div class="profile-card">' +
      '<div class="avatar-wrap" id="avatar-wrap" onclick="document.getElementById(\'avatar-input\').click()">' +
        (p.avatar_url ? '<img src="' + p.avatar_url + '" />' : '<div class="placeholder">' + p.title.icon + '</div>') +
        '<div class="avatar-edit">\u270E</div>' +
      '</div>' +
      '<input type="file" id="avatar-input" accept="image/*" />' +
      '<div class="profile-name">' + p.name + '</div>' +
      (p.country ? '<div class="profile-country">' + p.country + '</div>' : '') +
      '<div class="title-badge">' + p.title.icon + ' ' + p.title.name + '</div>' +
    '</div>' +

    '<div class="score-card">' +
      '<div class="score-label">Discovery Score</div>' +
      '<div class="score-val">' + p.discovery_score + '</div>' +
      (percentile ? '<div class="score-percentile">Top ' + percentile + '% Worldwide</div>' : '<div class="score-percentile">Join a quest to get ranked</div>') +
      '<div class="score-progress-label"><span>' + p.title.name + '</span><span>' + progressLabel + '</span></div>' +
      '<div class="score-bar"><div class="score-fill" style="width:' + progress.progress + '%"></div></div>' +
    '</div>' +

    '<div class="stat-row">' +
      '<div class="stat-box"><div class="stat-icon">\uD83D\uDD25</div><div class="stat-val">' + p.streak_days + '</div><div class="stat-lbl">Current Streak</div></div>' +
      '<div class="stat-box"><div class="stat-icon">\u26A1</div><div class="stat-val">' + p.longest_streak + '</div><div class="stat-lbl">Longest Streak</div></div>' +
    '</div>' +

    '<div class="badge-section">' +
      '<div class="badge-head"><span class="badge-title">Badges (' + badgeData.total_earned + '/' + badgeData.total_possible + ')</span><span class="badge-link">View all \u2192</span></div>' +
      '<div class="badge-row">' + badgeIcons + '</div>' +
    '</div>' +

    '<button class="share-btn" id="share-btn">\uD83D\uDCE4 Share My Stats</button>';

  document.getElementById("share-btn").addEventListener("click", function() {
    shareStats(p);
  });

  setupAvatarUpload(p);
}

function setupAvatarUpload(p) {
  var input = document.getElementById("avatar-input");
  input.addEventListener("change", function(e) {
    var file = e.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) {
      alert("Image too large. Max 2MB.");
      return;
    }
    var reader = new FileReader();
    reader.onload = function() {
      fetch(API + "/api/profile/avatar", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ image: reader.result })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.avatar_url) {
          p.avatar_url = data.avatar_url;
          document.getElementById("avatar-wrap").innerHTML =
            '<img src="' + data.avatar_url + '" />' +
            '<div class="avatar-edit">\u270E</div>';
        } else {
          alert("Upload failed: " + (data.error || "unknown error"));
        }
      })
      .catch(function() { alert("Upload failed."); });
    };
    reader.readAsDataURL(file);
  });
}
  </script>
  <script>
function shareStats(p) {
  var canvas = document.getElementById("shareCanvas");
  var ctx = canvas.getContext("2d");

  var grad = ctx.createLinearGradient(0, 0, 600, 800);
  grad.addColorStop(0, "#171205");
  grad.addColorStop(1, "#09090B");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 600, 800);

  ctx.fillStyle = "#D4AF37";
  ctx.font = "bold 28px sans-serif";
  ctx.fillText("\u2647 PLUTO REWARDS", 40, 60);

  if (p.avatar_url) {
    var img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = function() {
      ctx.save();
      ctx.beginPath();
      ctx.arc(90, 140, 50, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(img, 40, 90, 100, 100);
      ctx.restore();
      finishShareCard(p, ctx, canvas);
    };
    img.onerror = function() {
      ctx.font = "80px sans-serif";
      ctx.fillText(p.title.icon, 40, 180);
      finishShareCard(p, ctx, canvas);
    };
    img.src = p.avatar_url;
  } else {
    ctx.font = "80px sans-serif";
    ctx.fillText(p.title.icon, 40, 180);
    finishShareCard(p, ctx, canvas);
  }
}

function finishShareCard(p, ctx, canvas) {
  ctx.fillStyle = "#FFFFFF";
  ctx.font = "bold 40px sans-serif";
  ctx.fillText(p.name, 160, 145);

  ctx.fillStyle = "#8B5CF6";
  ctx.font = "bold 18px sans-serif";
  ctx.fillText(p.title.name.toUpperCase(), 160, 180);

  var stats = [
    { label: "DISCOVERY SCORE", val: p.discovery_score },
    { label: "CURRENT STREAK", val: p.streak_days + " days" },
    { label: "LONGEST STREAK", val: p.longest_streak + " days" },
    { label: "PLUTO EARNED", val: Number(p.total_pluto).toLocaleString() + " \u2647" }
  ];

  var y = 260;
  stats.forEach(function(s) {
    ctx.fillStyle = "rgba(255,255,255,0.05)";
    ctx.fillRect(40, y, 520, 80);
    ctx.fillStyle = "#F4C430";
    ctx.font = "bold 32px sans-serif";
    ctx.fillText(String(s.val), 60, y + 45);
    ctx.fillStyle = "#A1A1AA";
    ctx.font = "12px sans-serif";
    ctx.fillText(s.label, 60, y + 65);
    y += 95;
  });

  ctx.fillStyle = "#A1A1AA";
  ctx.font = "14px sans-serif";
  ctx.fillText("pluto-rewards.vercel.app", 40, 760);

  canvas.toBlob(function(blob) {
    var file = new File([blob], "pluto-stats.png", { type: "image/png" });
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({
        files: [file],
        title: "My Pluto Rewards Stats",
        text: "Check out my Pluto Rewards stats! " + p.title.icon + " " + p.title.name + ", " + p.discovery_score + " discovery score, " + p.streak_days + "-day streak \uD83D\uDD25"
      }).catch(function() {});
    } else {
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "pluto-stats.png";
      a.click();
    }
  });
}
</script>

</body>
</html>
