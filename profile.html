<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Profile — Pluto Rewards</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#04040f;color:#f0f0f5;font-family:'Segoe UI',sans-serif}
nav{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;background:#04040fcc;backdrop-filter:blur(10px);z-index:200}
.logo{font-size:18px;font-weight:800;letter-spacing:3px;color:#f0f0f5;text-decoration:none}
.logo span{color:#8b5cf6}
.hamburger{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#f0f0f5;width:40px;height:40px;border-radius:10px;font-size:18px;cursor:pointer}

#menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:none}
#menu-overlay.show{display:block}
#side-menu{position:fixed;top:0;right:-280px;width:260px;height:100%;background:#0f0e1c;border-left:1px solid rgba(139,92,246,0.2);z-index:301;transition:right .25s;padding:24px 20px;overflow-y:auto}
#side-menu.show{right:0}
.menu-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#6b7280;margin:18px 0 8px}
.menu-link{display:block;padding:12px 14px;border-radius:10px;color:#f0f0f5;text-decoration:none;font-size:14px;margin-bottom:4px}
.menu-link:active{background:rgba(139,92,246,0.1)}
.menu-genre{display:inline-block;font-size:11px;color:#9ca3af;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:50px;padding:6px 12px;margin:3px;text-decoration:none}
.genre-wrap{display:flex;flex-wrap:wrap;gap:0}
.menu-close{text-align:right;font-size:20px;color:#6b7280;cursor:pointer;margin-bottom:6px}

.wrap{max-width:560px;margin:0 auto;padding:24px 20px 60px}

.profile-card{background:linear-gradient(135deg,#1a1530,#0f0e1c);border:1px solid rgba(139,92,246,0.25);border-radius:20px;padding:28px;text-align:center;margin-bottom:20px;position:relative;overflow:hidden}
.profile-card::before{content:"";position:absolute;top:-50%;right:-30%;width:200px;height:200px;background:radial-gradient(circle,rgba(139,92,246,0.15),transparent 70%);pointer-events:none}

.avatar-wrap{position:relative;width:80px;height:80px;margin:0 auto 10px;border-radius:50%;overflow:hidden;border:2px solid rgba(139,92,246,0.4);background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:1}
.avatar-wrap img{width:100%;height:100%;object-fit:cover}
.avatar-wrap .placeholder{font-size:32px}
.avatar-edit{position:absolute;bottom:0;right:0;background:#00c896;color:#000;font-size:10px;font-weight:800;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center}
#avatar-input{display:none}

.profile-name{font-size:22px;font-weight:900;margin-bottom:4px}
.tier-name{font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:18px}
.flames-big{font-size:18px;margin-bottom:14px}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.stat-box{background:rgba(255,255,255,0.04);border-radius:12px;padding:14px 8px}
.stat-num{font-size:20px;font-weight:900;color:#a78bfa}
.stat-lbl{font-size:9px;color:#6b7280;letter-spacing:1px;text-transform:uppercase;margin-top:4px}

.progress-wrap{margin-top:14px}
.progress-label{font-size:11px;color:#9ca3af;margin-bottom:6px;display:flex;justify-content:space-between}
.progress-bar{height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .4s}

.section-title{font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#8b5cf6;margin:24px 0 12px}

.recap-tabs{display:flex;gap:8px;margin-bottom:12px}
.recap-tab{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#9ca3af;font-size:12px;padding:9px;border-radius:10px;cursor:pointer;text-align:center}
.recap-tab.active{background:rgba(139,92,246,0.15);border-color:#8b5cf6;color:#a78bfa;font-weight:700}
.recap-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px}
.recap-box{background:#0f0e1c;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:16px}
.recap-num{font-size:24px;font-weight:900;color:#00c896}
.recap-lbl{font-size:10px;color:#6b7280;letter-spacing:1px;text-transform:uppercase;margin-top:4px}

.genre-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px;margin-bottom:24px}
.genre-chip{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:8px 4px;text-align:center;font-size:10px;color:#4b5563;line-height:1.4}
.genre-chip.unlocked{background:rgba(0,200,150,0.08);border-color:rgba(0,200,150,0.3);color:#00c896;font-weight:700}

.friend-search{display:flex;gap:8px;margin-bottom:12px}
.friend-search input{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 12px;color:#f9fafb;font-size:13px;outline:none}
.friend-row{display:flex;align-items:center;gap:10px;background:#0f0e1c;border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:10px 12px;margin-bottom:8px}
.friend-avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;flex-shrink:0}
.friend-avatar img{width:100%;height:100%;object-fit:cover}
.friend-name{flex:1;font-size:13px;font-weight:600}
.friend-score{font-size:12px;color:#a78bfa;font-weight:700}
.follow-btn{background:rgba(139,92,246,0.15);border:1px solid #8b5cf6;color:#a78bfa;font-size:11px;font-weight:700;padding:6px 14px;border-radius:50px;cursor:pointer}
.empty-small{color:#6b7280;font-size:12px;padding:12px 0}

.wallet-box{background:#0f0e1c;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px;font-size:12px;color:#6b7280;font-family:monospace;word-break:break-all;margin-bottom:24px}

.share-btn{width:100%;background:linear-gradient(135deg,#00c896,#8b5cf6);color:#000;font-weight:800;font-size:15px;padding:15px;border:none;border-radius:50px;cursor:pointer;margin-bottom:12px}
.login-prompt{text-align:center;padding:60px 20px;color:#6b7280;font-size:14px}
.login-prompt a{color:#00c896;text-decoration:none;font-weight:700}

canvas{display:none}
</style>
</head>
<body>

<nav>
  <a class="logo" href="/"><span>♇</span> PLUTO</a>
  <button class="hamburger" id="menu-btn">☰</button>
</nav>

<div id="menu-overlay"></div>
<div id="side-menu">
  <div class="menu-close" id="menu-close">✕</div>
  <a class="menu-link" href="/">🏠 Home</a>
  <a class="menu-link" href="/campaigns.html">🎯 Campaigns</a>
  <a class="menu-link" href="/leaderboard.html">🏆 Leaderboard</a>
  <a class="menu-link" href="/profile.html">👤 Profile</a>
  <a class="menu-link" href="/#how">ℹ️ How It Works</a>

  <div class="menu-title">Browse by Genre</div>
  <div class="genre-wrap" id="menu-genres"></div>
</div>

<div class="wrap" id="content">
  <div class="login-prompt">Loading your profile...</div>
</div>

<canvas id="shareCanvas" width="600" height="800"></canvas>
<script>
var API = "https://pluto-rewards-production.up.railway.app";
var token = localStorage.getItem("pluto_token");
var ALL_GENRES_LIST = ["Afrobeats","Amapiano","Hip-Hop","R&B","Pop","Latin","UK Drill","K-Pop","EDM","Gospel","Reggae","Indie","Country","Bollywood","Afropop","Highlife","Bongo Flava","J-Pop","Arabic Pop","OPM","Sertanejo","C-Pop","Salsa","Trap","Ndombolo","Rai","Turkish Pop","Classical","French Pop"];

document.getElementById("menu-btn").addEventListener("click", function() {
  document.getElementById("side-menu").classList.add("show");
  document.getElementById("menu-overlay").classList.add("show");
});
document.getElementById("menu-close").addEventListener("click", closeMenu);
document.getElementById("menu-overlay").addEventListener("click", closeMenu);
function closeMenu() {
  document.getElementById("side-menu").classList.remove("show");
  document.getElementById("menu-overlay").classList.remove("show");
}

var menuGenres = document.getElementById("menu-genres");
ALL_GENRES_LIST.forEach(function(g) {
  var a = document.createElement("a");
  a.className = "menu-genre";
  a.href = "/campaigns.html";
  a.textContent = g;
  menuGenres.appendChild(a);
});

if (!token) {
  document.getElementById("content").innerHTML =
    '<div class="login-prompt">Connect your Spotify on the <a href="/">home page</a> to see your profile.</div>';
} else {
  fetch(API + "/api/profile/me", { headers: { "Authorization": "Bearer " + token } })
    .then(function(r) { return r.json(); })
    .then(render)
    .catch(function() {
      document.getElementById("content").innerHTML = '<div class="login-prompt">Could not load profile. Try refreshing.</div>';
    });
}

function render(p) {
  var memberDate = p.member_since ? new Date(p.member_since).toLocaleDateString("en-US", { month: "short", year: "numeric" }) : "—";

  var genreChips = p.all_genres.map(function(g) {
    var unlocked = p.genres_explored.indexOf(g) !== -1;
    return '<div class="genre-chip' + (unlocked ? ' unlocked' : '') + '">' + (unlocked ? "✓ " : "") + g + '</div>';
  }).join("");

  var progressLabel = p.tier.next
    ? p.tier.pointsToNext + " pts to " + p.tier.next
    : "Max tier reached";

  document.getElementById("content").innerHTML =
    '<div class="profile-card">' +
      '<div class="avatar-wrap" id="avatar-wrap" onclick="document.getElementById(\'avatar-input\').click()">' +
        (p.avatar_url ? '<img src="' + p.avatar_url + '" />' : '<div class="placeholder">' + p.tier.icon + '</div>') +
        '<div class="avatar-edit">\u270E</div>' +
      '</div>' +
      '<input type="file" id="avatar-input" accept="image/*" />' +
      '<div class="profile-name">' + p.name + '</div>' +
      '<div class="tier-name" style="color:' + p.tier.color + '">' + p.tier.name + ' Tier</div>' +
      (p.flames ? '<div class="flames-big">' + p.flames + ' ' + p.streak_days + '-day streak</div>' : '') +
      '<div class="stat-grid">' +
        '<div class="stat-box"><div class="stat-num">' + p.discovery_score + '</div><div class="stat-lbl">Discovery</div></div>' +
        '<div class="stat-box"><div class="stat-num">' + p.streak_days + '</div><div class="stat-lbl">Streak</div></div>' +
        '<div class="stat-box"><div class="stat-num">' + Number(p.total_pluto).toLocaleString() + '</div><div class="stat-lbl">\u2647 Earned</div></div>' +
      '</div>' +
      '<div class="progress-wrap">' +
        '<div class="progress-label"><span>' + p.tier.name + '</span><span>' + progressLabel + '</span></div>' +
        '<div class="progress-bar"><div class="progress-fill" style="width:' + p.tier.progress + '%;background:' + p.tier.color + '"></div></div>' +
      '</div>' +
    '</div>' +

    '<button class="share-btn" id="share-btn">\uD83D\uDCE4 Share My Stats</button>' +

    '<div class="section-title">Recap</div>' +
    '<div class="recap-tabs">' +
      '<div class="recap-tab active" data-period="week">This Week</div>' +
      '<div class="recap-tab" data-period="month">This Month</div>' +
    '</div>' +
    '<div class="recap-grid" id="recap-grid"><div class="empty-small">Loading recap...</div></div>' +

    '<div class="section-title">Friends</div>' +
    '<div class="friend-search">' +
      '<input type="text" id="friend-search-input" placeholder="Search by name...">' +
    '</div>' +
    '<div id="friend-search-results"></div>' +
    '<div id="friends-list"><div class="empty-small">Loading friends...</div></div>' +

    '<div class="section-title">Genre Map — ' + p.genres_count + ' / ' + p.total_genres + ' explored</div>' +
    '<div class="genre-grid">' + genreChips + '</div>' +

    '<div class="section-title">Wallet</div>' +
    '<div class="wallet-box">' + (p.wallet_address || "No wallet linked yet — join a campaign to add one") + '</div>' +

    '<div class="section-title">Member Since</div>' +
    '<div class="wallet-box">' + memberDate + '</div>';

  document.getElementById("share-btn").addEventListener("click", function() {
    shareStats(p);
  });

  setupAvatarUpload(p);
  setupRecap();
  setupFriends();
}

function setupRecap() {
  loadRecap("week");
  document.querySelectorAll(".recap-tab").forEach(function(tab) {
    tab.addEventListener("click", function() {
      document.querySelectorAll(".recap-tab").forEach(function(t) { t.classList.remove("active"); });
      tab.classList.add("active");
      loadRecap(tab.getAttribute("data-period"));
    });
  });
}

function loadRecap(period) {
  var grid = document.getElementById("recap-grid");
  grid.innerHTML = '<div class="empty-small">Loading...</div>';
  fetch(API + "/api/recap?period=" + period, { headers: { "Authorization": "Bearer " + token } })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      grid.innerHTML =
        '<div class="recap-box"><div class="recap-num">' + d.checkins + '</div><div class="recap-lbl">Check-ins</div></div>' +
        '<div class="recap-box"><div class="recap-num">+' + Number(d.pluto_earned).toLocaleString() + '</div><div class="recap-lbl">\u2647 Earned</div></div>' +
        '<div class="recap-box"><div class="recap-num">' + d.campaigns_joined + '</div><div class="recap-lbl">Campaigns Joined</div></div>' +
        '<div class="recap-box"><div class="recap-num">+' + d.new_genres + '</div><div class="recap-lbl">New Genres</div></div>';
    })
    .catch(function() {
      grid.innerHTML = '<div class="empty-small">Could not load recap.</div>';
    });
}

function setupFriends() {
  loadFriends();

  var searchInput = document.getElementById("friend-search-input");
  var timeout;
  searchInput.addEventListener("input", function() {
    clearTimeout(timeout);
    var q = searchInput.value.trim();
    var results = document.getElementById("friend-search-results");
    if (q.length < 2) {
      results.innerHTML = "";
      return;
    }
    timeout = setTimeout(function() {
      fetch(API + "/api/users/search?q=" + encodeURIComponent(q))
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (!d.users || d.users.length === 0) {
            results.innerHTML = '<div class="empty-small">No users found.</div>';
            return;
          }
          results.innerHTML = "";
          d.users.forEach(function(u) {
            var row = document.createElement("div");
            row.className = "friend-row";
            row.innerHTML =
              '<div class="friend-avatar">' + (u.avatar_url ? '<img src="' + u.avatar_url + '">' : '\uD83C\uDFB5') + '</div>' +
              '<div class="friend-name">' + (u.spotify_name || "Anonymous Fan") + '</div>' +
              '<div class="friend-score">' + (u.discovery_score || 0) + ' pts</div>' +
              '<button class="follow-btn" data-id="' + u.id + '">Follow</button>';
            results.appendChild(row);
          });
          results.querySelectorAll(".follow-btn").forEach(function(btn) {
            btn.addEventListener("click", function() {
              var id = btn.getAttribute("data-id");
              fetch(API + "/api/follow/" + id, {
                method: "POST",
                headers: { "Authorization": "Bearer " + token }
              })
              .then(function(r) { return r.json(); })
              .then(function() {
                btn.textContent = "Following";
                btn.disabled = true;
                loadFriends();
              });
            });
          });
        });
    }, 350);
  });
}

function loadFriends() {
  var list = document.getElementById("friends-list");
  fetch(API + "/api/friends", { headers: { "Authorization": "Bearer " + token } })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.friends || d.friends.length === 0) {
        list.innerHTML = '<div class="empty-small">No friends yet. Search above to follow people!</div>';
        return;
      }
      list.innerHTML = "";
      d.friends.forEach(function(f) {
        var row = document.createElement("div");
        row.className = "friend-row";
        row.innerHTML =
          '<div class="friend-avatar">' + (f.avatar_url ? '<img src="' + f.avatar_url + '">' : f.tier.icon) + '</div>' +
          '<div class="friend-name">' + f.name + '</div>' +
          '<div class="friend-score">' + f.discovery_score + ' pts ' + (f.streak_days >= 7 ? '\uD83D\uDD25' : '') + '</div>';
        list.appendChild(row);
      });
    })
    .catch(function() {
      list.innerHTML = '<div class="empty-small">Could not load friends.</div>';
    });
}
</script>
<script>
function setupAvatarUpload(p) {
  var input = document.getElementById("avatar-input");
  input.addEventListener("change", function(e) {
    var file = e.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) {
      alert("Image too large. Max 2MB.");
      return;
    }
    var reader = new FileReader();
    reader.onload = function() {
      fetch(API + "/api/profile/avatar", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ image: reader.result })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.avatar_url) {
          p.avatar_url = data.avatar_url;
          document.getElementById("avatar-wrap").innerHTML =
            '<img src="' + data.avatar_url + '" />' +
            '<div class="avatar-edit">\u270E</div>';
        } else {
          alert("Upload failed: " + (data.error || "unknown error"));
        }
      })
      .catch(function() { alert("Upload failed."); });
    };
    reader.readAsDataURL(file);
  });
}

function shareStats(p) {
  var canvas = document.getElementById("shareCanvas");
  var ctx = canvas.getContext("2d");

  var grad = ctx.createLinearGradient(0, 0, 600, 800);
  grad.addColorStop(0, "#1a1530");
  grad.addColorStop(1, "#04040f");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 600, 800);

  ctx.fillStyle = "#8b5cf6";
  ctx.font = "bold 28px sans-serif";
  ctx.fillText("\u2647 PLUTO REWARDS", 40, 60);

  if (p.avatar_url) {
    var img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = function() {
      ctx.save();
      ctx.beginPath();
      ctx.arc(90, 140, 50, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(img, 40, 90, 100, 100);
      ctx.restore();
      finishShareCard(p, ctx, canvas);
    };
    img.onerror = function() {
      ctx.font = "80px sans-serif";
      ctx.fillText(p.tier.icon, 40, 180);
      finishShareCard(p, ctx, canvas);
    };
    img.src = p.avatar_url;
  } else {
    ctx.font = "80px sans-serif";
    ctx.fillText(p.tier.icon, 40, 180);
    finishShareCard(p, ctx, canvas);
  }
}

function finishShareCard(p, ctx, canvas) {
  ctx.fillStyle = "#f9fafb";
  ctx.font = "bold 40px sans-serif";
  ctx.fillText(p.name, 160, 145);

  ctx.fillStyle = p.tier.color;
  ctx.font = "bold 18px sans-serif";
  ctx.fillText(p.tier.name.toUpperCase() + " TIER", 160, 180);

  var stats = [
    { label: "DISCOVERY SCORE", val: p.discovery_score },
    { label: "DAY STREAK " + (p.flames || ""), val: p.streak_days },
    { label: "PLUTO EARNED", val: Number(p.total_pluto).toLocaleString() + " \u2647" },
    { label: "GENRES EXPLORED", val: p.genres_count + " / " + p.total_genres }
  ];

  var y = 260;
  stats.forEach(function(s) {
    ctx.fillStyle = "rgba(255,255,255,0.05)";
    ctx.fillRect(40, y, 520, 80);
    ctx.fillStyle = "#a78bfa";
    ctx.font = "bold 32px sans-serif";
    ctx.fillText(String(s.val), 60, y + 45);
    ctx.fillStyle = "#6b7280";
    ctx.font = "12px sans-serif";
    ctx.fillText(s.label, 60, y + 65);
    y += 95;
  });

  ctx.fillStyle = "#6b7280";
  ctx.font = "14px sans-serif";
  ctx.fillText("pluto-rewards.vercel.app", 40, 760);

  canvas.toBlob(function(blob) {
    var file = new File([blob], "pluto-stats.png", { type: "image/png" });
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({
        files: [file],
        title: "My Pluto Rewards Stats",
        text: "Check out my Pluto Rewards stats! " + p.tier.icon + " " + p.tier.name + " tier, " + p.discovery_score + " discovery score, " + p.streak_days + "-day streak \uD83D\uDD25"
      }).catch(function() {});
    } else {
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "pluto-stats.png";
      a.click();
    }
  });
}
</script>

</body>
</html>
