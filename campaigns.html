<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Campaigns — Pluto Rewards</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#09090B;--card:#1C1C1E;--gold:#D4AF37;--gold-bright:#F4C430;
--gold-soft:#E6C76B;--purple:#8B5CF6;--cyan:#22D3EE;
--white:#FFFFFF;--gray:#A1A1AA;
--border-gold:rgba(212,175,55,0.15);
--border-purple:rgba(139,92,246,0.2);
--border-cyan:rgba(34,211,238,0.2);
}
body{background:var(--bg);color:var(--white);font-family:'Segoe UI',sans-serif;overflow-x:hidden;padding-bottom:80px;min-height:100vh}
body::before{content:"";position:fixed;inset:0;background-image:radial-gradient(1px 1px at 10% 20%,rgba(212,175,55,0.4) 0%,transparent 100%),radial-gradient(1px 1px at 30% 60%,rgba(139,92,246,0.3) 0%,transparent 100%),radial-gradient(1px 1px at 55% 15%,rgba(212,175,55,0.3) 0%,transparent 100%),radial-gradient(1px 1px at 75% 45%,rgba(34,211,238,0.3) 0%,transparent 100%),radial-gradient(1px 1px at 88% 20%,rgba(212,175,55,0.4) 0%,transparent 100%),radial-gradient(1px 1px at 20% 80%,rgba(139,92,246,0.2) 0%,transparent 100%),radial-gradient(1px 1px at 65% 75%,rgba(34,211,238,0.2) 0%,transparent 100%),radial-gradient(1px 1px at 90% 55%,rgba(212,175,55,0.3) 0%,transparent 100%);pointer-events:none;z-index:0}

nav.top-nav{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid var(--border-gold);position:sticky;top:0;background:rgba(9,9,11,0.92);backdrop-filter:blur(14px);z-index:100}
.logo{font-size:18px;font-weight:900;letter-spacing:4px;color:var(--white);text-decoration:none}
.logo-pluto{background:linear-gradient(135deg,var(--gold),var(--gold-bright));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.back{font-size:12px;color:var(--gray);text-decoration:none;background:rgba(255,255,255,0.04);border:1px solid var(--border-gold);border-radius:50px;padding:8px 16px}

.wrap{max-width:700px;margin:0 auto;padding:32px 20px 24px;position:relative;z-index:1}
.page-tag{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);margin-bottom:10px}
.page-title{font-size:clamp(28px,6vw,42px);font-weight:900;margin-bottom:6px;line-height:1.1}
.page-title span{background:linear-gradient(135deg,var(--gold),var(--gold-bright));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.page-sub{font-size:13px;color:var(--gray);margin-bottom:24px;line-height:1.7;max-width:500px}

.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.filter-btn{background:rgba(255,255,255,0.03);border:1px solid var(--border-gold);color:var(--gray);font-size:11px;padding:7px 16px;border-radius:50px;cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-btn.active{background:rgba(139,92,246,0.15);border-color:var(--purple);color:var(--purple);font-weight:700}

#campaign-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;position:relative;z-index:1}

.campaign-card{background:var(--card);border:1px solid var(--border-gold);border-radius:18px;padding:20px;cursor:pointer;transition:transform .2s,border-color .2s;position:relative;overflow:hidden}
.campaign-card::before{content:"";position:absolute;top:-40%;right:-20%;width:120px;height:120px;background:radial-gradient(circle,rgba(212,175,55,0.06),transparent 70%);pointer-events:none}
.campaign-card:hover{transform:translateY(-3px);border-color:rgba(212,175,55,0.35)}
.c-tag{font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-weight:700}
.c-title{font-size:14px;font-weight:700;color:var(--white);margin-bottom:8px;line-height:1.4}
.c-desc{font-size:11px;color:var(--gray);line-height:1.6;margin-bottom:16px}
.c-footer{display:flex;justify-content:space-between;align-items:center}
.c-pool{font-size:17px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--gold-bright));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.c-pool-label{font-size:9px;color:var(--gray);letter-spacing:1px;margin-top:2px}
.c-btn{font-size:11px;font-weight:700;color:#000;background:linear-gradient(135deg,var(--gold),var(--gold-bright));border-radius:50px;padding:7px 16px;border:none;cursor:pointer}

#detail-modal{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:998;display:none;align-items:center;justify-content:center;padding:20px}
#detail-modal.show{display:flex}
.modal-box{background:var(--card);border:1px solid rgba(212,175,55,0.3);border-radius:20px;padding:28px;max-width:420px;width:100%;box-shadow:0 0 40px rgba(212,175,55,0.08)}
.modal-genre{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:8px}
.modal-title{font-size:22px;font-weight:900;color:var(--white);margin-bottom:10px;line-height:1.2}
.modal-desc{font-size:13px;color:var(--gray);line-height:1.7;margin-bottom:18px}
.modal-stats{display:flex;gap:10px;margin-bottom:20px}
.modal-stat{flex:1;background:rgba(255,255,255,0.03);border:1px solid var(--border-gold);border-radius:12px;padding:14px;text-align:center}
.modal-stat-val{font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--gold-bright));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.modal-stat-label{font-size:9px;color:var(--gray);letter-spacing:1px;margin-top:3px}
.btn-join{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-bright));color:#000;font-weight:700;font-size:15px;padding:14px;border:none;border-radius:50px;cursor:pointer;margin-bottom:10px}
.btn-close{width:100%;background:rgba(255,255,255,0.04);color:var(--gray);font-weight:600;font-size:13px;padding:12px;border:1px solid var(--border-gold);border-radius:50px;cursor:pointer}

.empty{color:var(--gray);font-size:13px;text-align:center;padding:48px 0;grid-column:1/-1}
.loading{color:var(--gray);font-size:13px;text-align:center;padding:48px 0;grid-column:1/-1}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(28,28,30,0.97);border-top:1px solid var(--border-purple);display:flex;justify-content:space-around;align-items:center;padding:10px 0 14px;z-index:100;backdrop-filter:blur(10px)}
.bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:var(--gray);font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:4px 12px}
.bottom-nav a.active{color:var(--purple)}
.bottom-nav a .icon{font-size:20px}
</style>
</head>
<body>

<nav class="top-nav">
  <a class="logo" href="/"><span class="logo-pluto">♇ PLUTO</span></a>
  <a class="back" href="/">← Home</a>
</nav>

<div class="wrap">
  <div class="page-tag">🟢 39 campaigns live</div>
  <h1 class="page-title">Pick your genre.<br><span>Start earning.</span></h1>
  <p class="page-sub">Every campaign rewards a different kind of listener — top streamers, genre explorers, streak keepers, and more. Connect Spotify on the home page first.</p>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="top_listener">🏆 Top Listener</button>
    <button class="filter-btn" data-filter="discovery">👋 Discovery</button>
    <button class="filter-btn" data-filter="streak">🔥 Streak</button>
    <button class="filter-btn" data-filter="weekend_drop">⚡ Weekend Drop</button>
    <button class="filter-btn" data-filter="social">📣 Social</button>
    <button class="filter-btn" data-filter="milestone">🎯 Milestone</button>
    <button class="filter-btn" data-filter="referral">🤝 Referral</button>
  </div>

  <div id="campaign-grid">
    <div class="loading">Loading campaigns...</div>
  </div>
</div>

<div id="detail-modal">
  <div class="modal-box" id="modal-content"></div>
</div>

<nav class="bottom-nav">
  <a href="/"><span class="icon">🏠</span>Home</a>
  <a href="/campaigns.html" class="active"><span class="icon">🎯</span>Campaigns</a>
  <a href="/leaderboard.html"><span class="icon">🏆</span>Board</a>
  <a href="/profile.html"><span class="icon">👤</span>Profile</a>
</nav>
<script>
var API = "https://pluto-rewards-production.up.railway.app";
var TYPE_ICONS = {"top_listener":"🏆","discovery":"👋","streak":"🔥","weekend_drop":"⚡","social":"📣","milestone":"🎯","referral":"🤝","genre_battle":"🌍"};
var TYPE_COLORS = {"top_listener":"var(--gold)","discovery":"var(--cyan)","streak":"#f97316","weekend_drop":"var(--purple)","social":"var(--cyan)","milestone":"var(--gold)","referral":"var(--purple)","genre_battle":"var(--cyan)"};

var allCampaigns = [];
var campaignMap = {};

fetch(API + "/api/campaigns")
  .then(function(r){return r.json();})
  .then(function(data){
    allCampaigns = data.campaigns || [];
    allCampaigns.forEach(function(c){campaignMap[c.id]=c;});
    render("all");
  })
  .catch(function(){
    document.getElementById("campaign-grid").innerHTML='<div class="empty">Could not load campaigns. Try refreshing.</div>';
  });

function render(filter){
  var grid = document.getElementById("campaign-grid");
  var list = filter==="all" ? allCampaigns : allCampaigns.filter(function(c){return c.campaign_type===filter;});
  if(list.length===0){grid.innerHTML='<div class="empty">No campaigns in this category yet.</div>';return;}
  grid.innerHTML="";
  list.forEach(function(c){
    var color = TYPE_COLORS[c.campaign_type] || "var(--gold)";
    var icon = TYPE_ICONS[c.campaign_type] || "♇";
    var card = document.createElement("div");
    card.className="campaign-card";
    card.onclick=function(){showDetail(c.id);};
    card.innerHTML=
      '<div class="c-tag" style="color:'+color+'">'+icon+' '+(c.genre||"All Genres")+'</div>'+
      '<div class="c-title">'+c.title+'</div>'+
      '<div class="c-desc">'+(c.description||"")+'</div>'+
      '<div class="c-footer">'+
        '<div><div class="c-pool">'+Number(c.reward_pool).toLocaleString()+' \u2647</div><div class="c-pool-label">REWARD POOL</div></div>'+
        '<button class="c-btn">View \u2192</button>'+
      '</div>';
    grid.appendChild(card);
  });
}

document.getElementById("filters").addEventListener("click",function(e){
  if(!e.target.classList.contains("filter-btn"))return;
  document.querySelectorAll(".filter-btn").forEach(function(b){b.classList.remove("active");});
  e.target.classList.add("active");
  render(e.target.getAttribute("data-filter"));
});

function showDetail(id){
  var c = campaignMap[id];
  if(!c)return;
  var color = TYPE_COLORS[c.campaign_type] || "var(--gold)";
  document.getElementById("modal-content").innerHTML=
    '<div class="modal-genre" style="color:'+color+'">'+(TYPE_ICONS[c.campaign_type]||"♇")+' '+(c.genre||"All Genres")+'</div>'+
    '<div class="modal-title">'+c.title+'</div>'+
    '<div class="modal-desc">'+(c.description||"")+'</div>'+
    '<div class="modal-stats">'+
      '<div class="modal-stat"><div class="modal-stat-val">'+Number(c.reward_pool).toLocaleString()+' \u2647</div><div class="modal-stat-label">REWARD POOL</div></div>'+
      '<div class="modal-stat"><div class="modal-stat-val">'+(c.duration||"\u2014")+'</div><div class="modal-stat-label">DURATION</div></div>'+
    '</div>'+
    '<button class="btn-join" onclick="joinCampaign(\''+c.id+'\')">Join Campaign</button>'+
    '<button class="btn-close" onclick="closeModal()">Close</button>';
  document.getElementById("detail-modal").classList.add("show");
}

function closeModal(){
  document.getElementById("detail-modal").classList.remove("show");
}

function joinCampaign(id){
  var token = localStorage.getItem("pluto_token");
  if(!token){
    alert("Connect your Spotify on the home page first!");
    window.location.href="/";
    return;
  }
  var wallet = prompt("Enter your World Chain wallet address (0x...) to join:");
  if(!wallet||!wallet.startsWith("0x")){alert("Invalid wallet address");return;}
  fetch(API+"/api/campaigns/"+id+"/join",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
    body:JSON.stringify({wallet_address:wallet})
  })
  .then(function(r){return r.json();})
  .then(function(data){
    closeModal();
    if(data.error){alert("Error: "+data.error);}
    else{alert("You're in! \uD83C\uDF89\nDiscovery Score: "+(data.discovery_score||0)+"\nStreak: "+(data.streak_days||0)+" \uD83D\uDD25");}
  })
  .catch(function(){alert("Something went wrong. Try again.");});
}
</script>

</body>
</html>
